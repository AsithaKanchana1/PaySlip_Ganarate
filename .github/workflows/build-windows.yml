name: 🏗️ Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual trigger from GitHub UI

# ── Permissions needed to create releases ─────────────────────────────────────
permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Package (Windows)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl reportlab pillow pyinstaller msoffcrypto-tool xlrd

      # ── 4. Build the standalone Windows .exe with PyInstaller ────────────────
      - name: Build Windows .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "PaySlipGenerator" `
            --add-data "payslip_core.py;." `
            --hidden-import customtkinter `
            --hidden-import openpyxl `
            --hidden-import reportlab `
            --hidden-import PIL `
            --hidden-import msoffcrypto `
            --hidden-import xlrd `
            --collect-all customtkinter `
            --collect-data customtkinter `
            --icon "icon.ico" `
            app.py

      # ── 5. Package supporting files ──────────────────────────────────────────
      - name: Package supporting files
        shell: pwsh
        run: |
          # Create Excel folder and drop a placeholder so users know where to put their file
          New-Item -ItemType Directory -Force -Path "dist\PaySlipGenerator\Excel"
          "Place your salary Excel file (e.g. Slary_Slips.xlsx) here." `
            | Out-File "dist\PaySlipGenerator\Excel\PUT_EXCEL_FILE_HERE.txt"

          # Copy README if it exists
          if (Test-Path "README.md") {
            Copy-Item "README.md" "dist\PaySlipGenerator\README.md"
          }

          # Copy icon if it exists
          if (Test-Path "icon.ico") {
            Copy-Item "icon.ico" "dist\PaySlipGenerator\icon.ico"
          }

      # ── 6. Install Inno Setup and build the installer .exe ──────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Write-Host "=== Output folder contents ==="
          Get-ChildItem Output\

      # ── 7. Upload portable folder as artifact ────────────────────────────────
      - name: Upload portable app (folder)
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-Windows-Portable
          path: dist\PaySlipGenerator\
          retention-days: 30

      # ── 8. Upload installer .exe as artifact ─────────────────────────────────
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-Setup-exe
          path: Output\PaySlipGenerator_Setup_v*.exe
          retention-days: 90

      # ── 9. Create GitHub Release ─────────────────────────────────────────────
      - name: Get short SHA for release tag
        id: sha
        shell: pwsh
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          echo "short=$short" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag   = "build-${{ steps.sha.outputs.short }}"
          $title = "Pay Slip Generator - Build ${{ steps.sha.outputs.short }}"
          $notes = @"
          ## Auto-built from commit ``${{ github.sha }}``

          ### Download Options

          | File | Description |
          |------|-------------|
          | ``PaySlipGenerator_Setup_v1.0.exe`` | **Recommended** – Windows installer with Start Menu shortcut |
          | Portable zip (Artifacts tab) | Run without installing |

          ### How to Install
          1. Download ``PaySlipGenerator_Setup_v1.0.exe`` below
          2. Run it and follow the wizard
          3. Open **Pay Slip Generator** from Start Menu
          4. Copy your salary ``*.xlsx`` file into the ``Excel\`` folder shown after install
          5. Browse for the file, pick the month, click Generate!

          ---
          Built automatically by GitHub Actions on Windows
          Developer: Asitha Kanchana — https://github.com/AsithaKanchana1
          "@

          # Delete existing tag/release if it exists (safe re-run)
          gh release delete $tag --yes 2>$null
          git push --delete origin $tag 2>$null

          # Create release and attach the installer exe
          gh release create $tag `
            --title $title `
            --notes $notes `
            (Get-ChildItem "Output\PaySlipGenerator_Setup_v*.exe" | Select-Object -First 1).FullName
