name: Build Windows EXE

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build on Windows runner
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Python and pip
        run: |
          python -V
          pip -V

      - name: Build using build_windows.bat
        shell: cmd
        run: |
          call build_windows.bat

      - name: Install Inno Setup (choco)
        shell: cmd
        run: |
          choco install innosetup -y
          refreshenv || echo refreshenv skipped

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          if exist installer.iss (
            echo Compiling installer with ISCC...
            ISCC.exe installer.iss
          ) else (
            echo installer.iss not found; skipping installer build
          )

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-dist
          path: |
            dist/PaySlipGenerator
      - name: Upload Windows installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-installer
          path: |
            Output/*.exe
name: 🏗️ Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual trigger from GitHub UI

# ── Permissions needed to create releases ─────────────────────────────────────
permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Package (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Python dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl reportlab pillow pyinstaller

      # ── 4. Build the standalone Windows .exe with PyInstaller ────────────────
      - name: Build Windows .exe with PyInstaller
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "PaySlipGenerator" `
            --add-data "payslip_core.py;." `
            --hidden-import customtkinter `
            --hidden-import openpyxl `
            --hidden-import reportlab `
            --hidden-import PIL `
            --collect-all customtkinter `
            --collect-data customtkinter `
            --icon "icon.ico" `
            app.py

      # ── 5. Copy supporting files into the dist folder ────────────────────────
      - name: Package supporting files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist\PaySlipGenerator\Excel"
          Copy-Item "README.md" "dist\PaySlipGenerator\README.md"
          if (Test-Path "icon.ico") {
            Copy-Item "icon.ico" "dist\PaySlipGenerator\icon.ico"
          }
          "Place your Slary_Slips.xlsx here" `
            | Out-File "dist\PaySlipGenerator\Excel\PUT_EXCEL_FILE_HERE.txt"

      # ── 6. Build the Inno Setup installer (.exe) ─────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Inno Setup installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          dir Output\

      # ── 7. Upload the portable folder as an artifact ────────────────────────
      - name: Upload portable app (folder)
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-Windows-Portable
          path: dist\PaySlipGenerator\
          retention-days: 30

      # ── 8. Upload the installer .exe as an artifact ─────────────────────────
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: PaySlipGenerator-Setup-exe
          path: Output\PaySlipGenerator_Setup_v*.exe
          retention-days: 90

      # ── 9. Create GitHub Release using GitHub CLI ────────────────────────────
      - name: Get short SHA for release tag
        id: sha
        shell: pwsh
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          echo "short=$short" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag     = "build-${{ steps.sha.outputs.short }}"
          $title   = "Pay Slip Generator - Build ${{ steps.sha.outputs.short }}"
          $notes   = @"
          ## Auto-built from commit ``${{ github.sha }}``

          ### Download Options

          | File | Description |
          |------|-------------|
          | ``PaySlipGenerator_Setup_v1.0.exe`` | **Recommended** - Windows installer with Start Menu shortcut |
          | Portable zip (from Artifacts tab) | Run without installing |

          ### How to Install
          1. Download ``PaySlipGenerator_Setup_v1.0.exe`` below
          2. Run it and follow the wizard
          3. Open **Pay Slip Generator** from Start Menu
          4. Copy your ``Slary_Slips.xlsx`` into the ``Excel\`` folder shown after install
          5. Browse, pick month, click Generate!

          ---
          Built automatically by GitHub Actions on Windows
          Developer: Asitha Kanchana - https://github.com/AsithaKanchana1
          "@

          # Delete existing tag if it exists (re-run protection)
          gh release delete $tag --yes 2>$null
          git push --delete origin $tag 2>$null

          # Create the release and upload the installer
          gh release create $tag `
            --title $title `
            --notes $notes `
            Output\PaySlipGenerator_Setup_v*.exe
